version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: fastapi_backend

    ports:
      - "8080:8080"

    env_file:
      - .env

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: react_frontend

    ports:
      - "3000:80"

    depends_on:
      - backend

    restart: unless-stopped